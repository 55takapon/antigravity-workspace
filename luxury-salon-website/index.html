<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIÈRE | Luxury Private Salon</title>
    <meta name="description" content="洗練された大人のためのプライベートサロン「LUMIÈRE」。あなただけの美しさを引き出す、至福のひとときを。">
    <link rel="icon" href="favicon.ico"> <!-- Placeholder -->
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Zen+Old+Mincho:wght@400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <h1 class="logo">LUMIÈRE</h1>

            <!-- Mobile Menu Toggle (Pure CSS) -->
            <input type="checkbox" id="menu-toggle" class="menu-checkbox">
            <label for="menu-toggle" class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </label>

            <nav class="site-nav">
                <ul>
                    <li><a href="#concept">Concept</a></li>
                    <li><a href="#menu">Menu</a></li>
                    <li><a href="#gallery">Gallery</a></li>
                    <li><a href="#access">Access</a></li>
                    <li><a href="#contact" class="nav-contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero" id="top">
            <div class="hero-bg">
                <img src="assets/hero_bg.png" alt="Salon Interior" class="hero-image">
                <div class="overlay"></div>
            </div>

            <div class="hero-content">
                <div class="vertical-text-container">
                    <p class="vertical-text">
                        <span class="fade-in d-1">静寂に包まれた</span>
                        <span class="fade-in d-2">私だけの時間</span>
                    </p>
                </div>

                <div class="main-copy-container">
                    <h2 class="main-copy fade-in d-3">
                        あなただけの、<br>美しさを
                    </h2>
                </div>

                <div class="cta-container fade-in d-4">
                    <a href="#reservation" class="btn-cta">
                        <span class="en">Reservation</span>
                        <span class="jp">ご予約・お問い合わせ</span>
                    </a>
                </div>
            </div>

            <div class="scroll-down fade-in d-5">
                <span>SCROLL</span>
                <div class="line"></div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2024 LUMIÈRE Salon. All Rights Reserved.</p>
    </footer>
</body>

</html>
